<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>拾茶序官网入口</title>
  <meta name="description" content="拾茶序新式茶饮品牌官网页面入口，包含首页、饮品菜单、门店查询、品牌故事、招商加盟和联系我们。" />
  <style data-od-inline-asset="styles.css">
:root {
  --bg: oklch(97.5% 0.017 95);
  --surface: oklch(99% 0.01 104);
  --surface-strong: oklch(100% 0.004 100);
  --fg: oklch(27% 0.045 126);
  --muted: oklch(50% 0.035 118);
  --border: oklch(88% 0.026 102);
  --accent: oklch(58% 0.095 142);
  --accent-deep: oklch(37% 0.08 142);
  --tea-soft: oklch(93% 0.035 130);
  --wood: oklch(70% 0.07 72);
  --wood-soft: oklch(91% 0.038 78);
  --gold: oklch(76% 0.08 88);
  --low: oklch(63% 0.095 166);
  --warn: oklch(71% 0.10 78);
  --danger: oklch(58% 0.12 32);
  --shadow: 0 22px 70px oklch(38% 0.05 120 / 0.13);
  --radius: 18px;
  --radius-sm: 12px;
  --max: 1180px;
  --display: "Noto Serif SC", "Songti SC", "STSong", serif;
  --body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --mono: "DIN Alternate", "SF Mono", ui-monospace, monospace;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100dvh;
  background:
    radial-gradient(circle at 12% 8%, oklch(94% 0.04 130 / 0.68), transparent 28rem),
    radial-gradient(circle at 88% 16%, oklch(91% 0.04 78 / 0.54), transparent 24rem),
    var(--bg);
  color: var(--fg);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.34;
  background:
    linear-gradient(120deg, transparent 0 48%, oklch(74% 0.045 132 / 0.18) 49% 50%, transparent 51%),
    linear-gradient(90deg, oklch(86% 0.026 100 / 0.28) 1px, transparent 1px);
  background-size: 220px 220px, 32px 32px;
}

body.menu-open {
  overflow: hidden;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.skip-link {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 200;
  transform: translateY(-150%);
  border-radius: 999px;
  background: var(--accent-deep);
  color: white;
  padding: 10px 14px;
}

.skip-link:focus {
  transform: translateY(0);
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 80;
  border-bottom: 1px solid oklch(89% 0.025 102 / 0.82);
  background: oklch(98% 0.012 96 / 0.88);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
}

.nav-wrap {
  width: min(100% - 32px, var(--max));
  min-height: 70px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
}

.brand-mark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: max-content;
}

.brand-seal {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: white;
  background:
    radial-gradient(circle at 32% 28%, oklch(78% 0.08 132), transparent 29%),
    var(--accent-deep);
  font-family: var(--display);
  font-size: 18px;
  box-shadow: inset 0 0 0 1px oklch(100% 0 0 / 0.28);
}

.brand-word {
  display: grid;
  line-height: 1.15;
}

.brand-word strong {
  font-family: var(--display);
  font-size: 20px;
  letter-spacing: 0.08em;
  font-weight: 700;
}

.brand-word span {
  color: var(--muted);
  font-size: 12px;
}

.nav-links {
  justify-self: center;
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-links a {
  min-height: 42px;
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 0 14px;
  color: var(--muted);
  transition: color 180ms ease, background 180ms ease;
}

.nav-links a:hover,
.nav-links a:focus-visible,
body[data-page="home"] .nav-home,
body[data-page="menu"] .nav-menu,
body[data-page="stores"] .nav-stores,
body[data-page="story"] .nav-story,
body[data-page="franchise"] .nav-franchise,
body[data-page="contact"] .nav-contact {
  color: var(--accent-deep);
  background: var(--tea-soft);
}

.nav-action {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-toggle {
  display: none;
  width: 44px;
  height: 44px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--accent-deep);
  cursor: pointer;
}

.nav-toggle span {
  display: block;
  width: 18px;
  height: 2px;
  margin: 4px auto;
  border-radius: 999px;
  background: currentColor;
  transition: transform 180ms ease, opacity 180ms ease;
}

.nav-toggle[aria-expanded="true"] span:nth-child(1) {
  transform: translateY(6px) rotate(45deg);
}

.nav-toggle[aria-expanded="true"] span:nth-child(2) {
  opacity: 0;
}

.nav-toggle[aria-expanded="true"] span:nth-child(3) {
  transform: translateY(-6px) rotate(-45deg);
}

.button,
.ghost-button,
.text-link {
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 999px;
  padding: 0 18px;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, color 180ms ease;
}

.button {
  background: var(--accent-deep);
  color: white;
  box-shadow: 0 12px 30px oklch(37% 0.08 142 / 0.18);
}

.button:hover,
.button:focus-visible {
  transform: translateY(-1px);
  background: oklch(32% 0.08 142);
}

.button:active,
.ghost-button:active,
.text-link:active,
.filter-button:active,
.card-button:active {
  transform: translateY(1px) scale(0.99);
}

.ghost-button {
  background: oklch(100% 0.002 100 / 0.78);
  color: var(--accent-deep);
  border-color: var(--border);
}

.ghost-button:hover,
.ghost-button:focus-visible {
  background: var(--tea-soft);
  border-color: oklch(77% 0.05 128);
}

.text-link {
  color: var(--accent-deep);
  padding-inline: 0;
  min-height: auto;
}

.page-main {
  min-height: 70dvh;
}

.section {
  width: min(100% - 32px, var(--max));
  margin: 0 auto;
  padding: clamp(56px, 8vw, 112px) 0;
}

.section.tight {
  padding: clamp(36px, 6vw, 76px) 0;
}

.section-head {
  max-width: 720px;
  display: grid;
  gap: 14px;
  margin-bottom: 30px;
}

.section-head.center {
  margin-inline: auto;
  text-align: center;
}

.eyebrow {
  color: var(--accent-deep);
  font-size: 14px;
  font-weight: 700;
}

h1,
h2,
h3,
p {
  margin: 0;
}

h1,
h2,
h3 {
  text-wrap: balance;
}

h1,
h2 {
  font-family: var(--display);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: 0.02em;
}

h1 {
  font-size: clamp(42px, 7vw, 76px);
  max-width: 11ch;
}

h2 {
  font-size: clamp(30px, 4.5vw, 50px);
}

h3 {
  font-size: 21px;
  line-height: 1.35;
}

.lead {
  color: var(--muted);
  font-size: clamp(17px, 2vw, 19px);
  max-width: 58ch;
}

.soft-note {
  color: var(--muted);
  font-size: 14px;
}

.hero {
  width: min(100% - 32px, var(--max));
  min-height: calc(100dvh - 72px);
  margin: 0 auto;
  padding: clamp(40px, 7vw, 72px) 0 54px;
  display: grid;
  grid-template-columns: minmax(0, 0.92fr) minmax(340px, 1.08fr);
  align-items: center;
  gap: clamp(34px, 6vw, 76px);
}

.hero-copy {
  display: grid;
  gap: 20px;
  align-content: center;
}

.hero-actions,
.inline-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

.hero-panel {
  position: relative;
  min-height: clamp(420px, 58vw, 620px);
  display: grid;
  grid-template-columns: 1fr;
}

.hero-photo {
  border-radius: calc(var(--radius) + 8px);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid oklch(100% 0 0 / 0.7);
}

.hero-photo::after,
.story-photo::after,
.drink-photo::after,
.store-photo::after,
.gallery-photo::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, transparent 48%, oklch(27% 0.045 126 / 0.18));
}

.hero-photo,
.story-photo,
.drink-photo,
.store-photo,
.gallery-photo {
  position: relative;
  background: var(--tea-soft);
}

.season-card {
  position: absolute;
  left: -34px;
  bottom: 34px;
  width: min(280px, 64%);
  padding: 18px;
  border: 1px solid oklch(100% 0 0 / 0.72);
  border-radius: var(--radius);
  background: oklch(99% 0.01 104 / 0.88);
  backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
  display: grid;
  gap: 10px;
}

.season-card strong {
  font-family: var(--display);
  font-size: 22px;
}

.season-card span {
  color: var(--muted);
  font-size: 14px;
}

.tea-orbit {
  position: absolute;
  right: -26px;
  top: 28px;
  width: 118px;
  height: 118px;
  border-radius: 50%;
  border: 1px solid oklch(84% 0.04 102);
  background:
    radial-gradient(circle at 35% 32%, oklch(96% 0.02 95), transparent 22%),
    radial-gradient(circle at 62% 66%, oklch(77% 0.08 88 / 0.7), transparent 30%),
    var(--wood-soft);
}

.launcher-hero {
  width: min(100% - 32px, var(--max));
  min-height: calc(100dvh - 72px);
  margin: 0 auto;
  padding: clamp(48px, 8vw, 88px) 0;
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.1fr);
  align-items: center;
  gap: clamp(32px, 7vw, 86px);
}

.launcher-panel {
  border-radius: calc(var(--radius) + 8px);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: clamp(18px, 3vw, 30px);
}

.screen-grid,
.drink-grid,
.store-grid,
.benefit-grid,
.contact-grid,
.gallery-grid,
.menu-feature-grid {
  display: grid;
  gap: 18px;
}

.screen-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.screen-card,
.drink-card,
.store-card,
.benefit-card,
.contact-card,
.policy-card,
.flow-card,
.message-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: oklch(100% 0.004 100 / 0.78);
  overflow: hidden;
}

.screen-card {
  display: grid;
  grid-template-rows: 170px auto;
  transition: transform 180ms ease, box-shadow 180ms ease;
}

.screen-card:hover,
.screen-card:focus-visible {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

.screen-thumb {
  overflow: hidden;
  background: var(--tea-soft);
}

.screen-card-body {
  display: grid;
  gap: 8px;
  padding: 18px;
}

.screen-card-body span {
  color: var(--muted);
  font-size: 14px;
}

.carousel {
  position: relative;
  overflow: hidden;
  border-radius: calc(var(--radius) + 8px);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.carousel-track {
  display: grid;
}

.carousel-slide {
  grid-area: 1 / 1;
  min-height: 430px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 420ms ease;
  display: grid;
  grid-template-columns: minmax(0, 0.75fr) minmax(300px, 1fr);
}

.carousel-slide.is-active {
  opacity: 1;
  pointer-events: auto;
}

.carousel-copy {
  padding: clamp(24px, 4vw, 48px);
  display: grid;
  align-content: center;
  gap: 16px;
}

.carousel-copy h2 {
  font-size: clamp(30px, 4vw, 48px);
}

.carousel-copy p {
  color: var(--muted);
}

.carousel-media {
  min-height: 380px;
}

.carousel-controls {
  position: absolute;
  left: clamp(20px, 4vw, 44px);
  bottom: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-button {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: oklch(100% 0.004 100 / 0.84);
  color: var(--accent-deep);
  display: grid;
  place-items: center;
  cursor: pointer;
}

.popular-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr 0.9fr;
  gap: 18px;
}

.drink-card {
  display: grid;
  grid-template-rows: 260px auto;
}

.popular-grid .drink-card:first-child {
  grid-row: span 2;
  grid-template-rows: 420px auto;
}

.drink-photo {
  overflow: hidden;
}

.drink-body {
  padding: 18px;
  display: grid;
  gap: 12px;
}

.drink-meta,
.store-meta,
.mini-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.tag {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  border-radius: 999px;
  padding: 0 10px;
  background: var(--tea-soft);
  color: var(--accent-deep);
  font-size: 13px;
}

.tag.wood {
  background: var(--wood-soft);
  color: oklch(42% 0.06 72);
}

.tag.low {
  background: oklch(91% 0.045 166);
  color: oklch(35% 0.08 166);
}

.price {
  font-family: var(--mono);
  font-size: 22px;
  color: var(--accent-deep);
}

.card-button {
  min-height: 42px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--accent-deep);
  cursor: pointer;
}

.split-feature {
  display: grid;
  grid-template-columns: minmax(0, 0.94fr) minmax(340px, 1.06fr);
  gap: clamp(28px, 5vw, 64px);
  align-items: center;
}

.story-panel {
  display: grid;
  gap: 22px;
}

.quote-box {
  border-left: 4px solid var(--accent);
  padding: 8px 0 8px 20px;
  color: var(--accent-deep);
  font-family: var(--display);
  font-size: clamp(24px, 3vw, 34px);
  line-height: 1.35;
}

.story-photo,
.gallery-photo,
.store-photo {
  min-height: 360px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}

.events-strip {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 18px;
}

.event-main {
  min-height: 320px;
  border-radius: var(--radius);
  background:
    linear-gradient(135deg, oklch(93% 0.035 130), oklch(92% 0.038 78)),
    var(--surface);
  border: 1px solid var(--border);
  padding: clamp(24px, 4vw, 42px);
  display: grid;
  align-content: end;
  gap: 14px;
}

.event-list {
  display: grid;
  gap: 14px;
}

.event-item {
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 18px;
  display: grid;
  gap: 8px;
}

.filter-bar {
  position: sticky;
  top: 82px;
  z-index: 30;
  margin: 0 auto 28px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: oklch(98% 0.012 96 / 0.9);
  backdrop-filter: blur(14px);
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.filter-button {
  min-height: 42px;
  flex: 0 0 auto;
  border-radius: 999px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  padding: 0 16px;
  cursor: pointer;
}

.filter-button[aria-pressed="true"],
.filter-button:hover,
.filter-button:focus-visible {
  background: var(--accent-deep);
  color: white;
}

.drink-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.menu-feature-grid {
  grid-template-columns: 1.2fr 0.8fr;
}

.nutrition-card {
  border-radius: var(--radius);
  background: var(--tea-soft);
  padding: 24px;
  display: grid;
  gap: 16px;
}

.nutrition-list {
  display: grid;
  gap: 10px;
  padding: 0;
  margin: 0;
  list-style: none;
}

.nutrition-list li {
  display: flex;
  justify-content: space-between;
  gap: 18px;
}

.store-layout {
  display: grid;
  grid-template-columns: minmax(300px, 0.9fr) minmax(0, 1.1fr);
  gap: 22px;
  align-items: start;
}

.store-panel {
  display: grid;
  gap: 16px;
}

.store-grid {
  grid-template-columns: 1fr;
}

.store-card {
  display: grid;
  grid-template-columns: 150px 1fr;
  min-height: 158px;
}

.store-photo {
  min-height: 100%;
  border-radius: 0;
  border: 0;
}

.store-body {
  padding: 16px;
  display: grid;
  gap: 8px;
}

.map-card {
  position: sticky;
  top: 98px;
  min-height: 610px;
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 8px);
  background:
    linear-gradient(90deg, oklch(91% 0.03 130 / 0.7) 1px, transparent 1px),
    linear-gradient(0deg, oklch(91% 0.03 130 / 0.7) 1px, transparent 1px),
    radial-gradient(circle at 30% 26%, oklch(88% 0.06 142 / 0.78), transparent 12rem),
    radial-gradient(circle at 72% 64%, oklch(91% 0.05 78 / 0.9), transparent 13rem),
    var(--surface);
  background-size: 46px 46px, 46px 46px, auto, auto, auto;
  overflow: hidden;
}

.map-river {
  position: absolute;
  inset: auto -10% 36% -10%;
  height: 90px;
  transform: rotate(-9deg);
  border-radius: 999px;
  background: oklch(84% 0.045 180 / 0.45);
}

.map-pin {
  position: absolute;
  width: 18px;
  height: 18px;
  border: 3px solid white;
  border-radius: 50%;
  background: var(--accent-deep);
  box-shadow: 0 8px 22px oklch(37% 0.08 142 / 0.28);
  cursor: pointer;
}

.map-pin.is-active {
  background: var(--warn);
  transform: scale(1.22);
}

.map-label {
  position: absolute;
  left: 24px;
  bottom: 24px;
  max-width: 280px;
  border-radius: var(--radius);
  background: oklch(100% 0.004 100 / 0.86);
  border: 1px solid var(--border);
  padding: 16px;
  backdrop-filter: blur(14px);
}

.story-timeline,
.flow-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}

.timeline-card,
.flow-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 20px;
  display: grid;
  gap: 10px;
}

.timeline-card strong,
.flow-card strong {
  color: var(--accent-deep);
}

.gallery-grid {
  grid-template-columns: 1.2fr 0.8fr 0.8fr;
}

.gallery-grid .gallery-photo:first-child {
  grid-row: span 2;
  min-height: 520px;
}

.benefit-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.benefit-card,
.policy-card,
.contact-card,
.message-card {
  padding: 22px;
  display: grid;
  gap: 12px;
}

.cost-panel {
  border-radius: calc(var(--radius) + 8px);
  background:
    linear-gradient(135deg, oklch(94% 0.035 130), oklch(91% 0.035 82)),
    var(--surface);
  border: 1px solid var(--border);
  padding: clamp(24px, 4vw, 42px);
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 24px;
  align-items: center;
}

.cost-number {
  font-family: var(--display);
  color: var(--accent-deep);
  font-size: clamp(38px, 6vw, 68px);
  line-height: 1;
}

.policy-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.contact-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.form-shell {
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 8px);
  background: var(--surface);
  padding: clamp(22px, 4vw, 34px);
  box-shadow: 0 12px 40px oklch(38% 0.05 120 / 0.08);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.field {
  display: grid;
  gap: 8px;
}

.field.full {
  grid-column: 1 / -1;
}

.field label {
  color: var(--fg);
  font-weight: 700;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  min-height: 48px;
  border-radius: var(--radius-sm);
  border: 1px solid oklch(82% 0.035 102);
  background: oklch(100% 0.004 100);
  color: var(--fg);
  padding: 12px 14px;
  outline: none;
  transition: border-color 160ms ease, box-shadow 160ms ease;
}

.field textarea {
  min-height: 128px;
  resize: vertical;
}

.field input::placeholder,
.field textarea::placeholder {
  color: oklch(48% 0.035 118);
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px oklch(58% 0.095 142 / 0.16);
}

.field-error {
  min-height: 20px;
  color: var(--danger);
  font-size: 13px;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 120;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: oklch(20% 0.04 120 / 0.46);
}

.modal-backdrop.is-open {
  display: flex;
}

.modal-card {
  width: min(920px, 100%);
  max-height: min(760px, 92dvh);
  overflow: auto;
  border-radius: calc(var(--radius) + 8px);
  background: var(--surface);
  box-shadow: 0 36px 120px oklch(16% 0.04 120 / 0.32);
  display: grid;
  grid-template-columns: minmax(260px, 0.92fr) minmax(0, 1.08fr);
}

.modal-media {
  min-height: 420px;
  background: var(--tea-soft);
}

.modal-body {
  padding: clamp(22px, 4vw, 36px);
  display: grid;
  gap: 16px;
  align-content: start;
}

.modal-close {
  justify-self: end;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  cursor: pointer;
}

.option-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.option-box {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: oklch(100% 0.004 100);
}

.toast {
  position: fixed;
  right: 22px;
  bottom: 22px;
  z-index: 180;
  width: min(360px, calc(100% - 32px));
  border-radius: var(--radius);
  background: var(--accent-deep);
  color: white;
  padding: 16px 18px;
  box-shadow: var(--shadow);
  transform: translateY(120%);
  opacity: 0;
  transition: transform 240ms ease, opacity 240ms ease;
}

.toast.is-visible {
  transform: translateY(0);
  opacity: 1;
}

.site-footer {
  border-top: 1px solid var(--border);
  background: oklch(94% 0.02 98 / 0.7);
}

.footer-grid {
  width: min(100% - 32px, var(--max));
  margin: 0 auto;
  padding: 36px 0;
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 24px;
  align-items: start;
}

.footer-links,
.social-links {
  display: grid;
  gap: 8px;
}

.qr {
  width: 96px;
  height: 96px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background:
    linear-gradient(90deg, var(--accent-deep) 8px, transparent 8px 16px, var(--accent-deep) 16px 24px, transparent 24px),
    linear-gradient(0deg, transparent 8px, var(--accent-deep) 8px 16px, transparent 16px 24px, var(--accent-deep) 24px),
    var(--surface);
  background-size: 32px 32px;
}

.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 520ms ease, transform 520ms ease;
}

.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}

.hidden {
  display: none !important;
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }

  *::before,

    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;

(function () {
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function getToast() {
    let toast = document.querySelector("[data-toast]");
    if (!toast) {
      toast = document.createElement("div");
      toast.className = "toast";
      toast.setAttribute("data-toast", "");
      toast.setAttribute("role", "status");
      toast.setAttribute("aria-live", "polite");
      document.body.appendChild(toast);
    }
    return toast;
  }

  function showToast(message) {
    const toast = getToast();
    toast.textContent = message;
    toast.classList.add("is-visible");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => {
      toast.classList.remove("is-visible");
    }, 3200);
  }

  function initNav() {
    const toggle = document.querySelector("[data-nav-toggle]");
    const links = document.querySelector("[data-nav-links]");
    if (!toggle || !links) return;

    toggle.addEventListener("click", () => {
      const open = toggle.getAttribute("aria-expanded") === "true";
      toggle.setAttribute("aria-expanded", String(!open));
      links.classList.toggle("is-open", !open);
      document.body.classList.toggle("menu-open", !open);
    });

    links.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", () => {
        toggle.setAttribute("aria-expanded", "false");
        links.classList.remove("is-open");
        document.body.classList.remove("menu-open");
      });
    });
  }

  function initReveal() {
    const items = Array.from(document.querySelectorAll(".reveal"));
    if (!items.length || reduceMotion || !("IntersectionObserver" in window)) {
      items.forEach((item) => item.classList.add("is-visible"));
      return;
    }

    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.16 });

    items.forEach((item) => io.observe(item));
  }

  function initCarousel() {
    const carousels = document.querySelectorAll("[data-carousel]");
    carousels.forEach((carousel) => {
      const slides = Array.from(carousel.querySelectorAll("[data-slide]"));
      const prev = carousel.querySelector("[data-carousel-prev]");
      const next = carousel.querySelector("[data-carousel-next]");
      const label = carousel.querySelector("[data-carousel-count]");
      let index = 0;
      let timer = null;

      function paint(nextIndex) {
        index = (nextIndex + slides.length) % slides.length;
        slides.forEach((slide, i) => {
          slide.classList.toggle("is-active", i === index);
          slide.setAttribute("aria-hidden", String(i !== index));
        });
        if (label) label.textContent = `${index + 1} / ${slides.length}`;
      }

      function start() {
        if (reduceMotion || slides.length < 2) return;
        timer = window.setInterval(() => paint(index + 1), 5200);
      }

      function stop() {
        window.clearInterval(timer);
      }

      if (!slides.length) return;
      paint(0);
      prev?.addEventListener("click", () => {
        stop();
        paint(index - 1);
        start();
      });
      next?.addEventListener("click", () => {
        stop();
        paint(index + 1);
        start();
      });
      carousel.addEventListener("mouseenter", stop);
      carousel.addEventListener("mouseleave", start);
      start();
    });
  }

  function initDrinkFilters() {
    const bar = document.querySelector("[data-filter-bar]");
    const cards = Array.from(document.querySelectorAll("[data-drink-card]"));
    if (!bar || !cards.length) return;

    bar.addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      const filter = button.dataset.filter;
      bar.querySelectorAll("[data-filter]").forEach((item) => {
        item.setAttribute("aria-pressed", String(item === button));
      });
      cards.forEach((card) => {
        const match = filter === "all" || card.dataset.category === filter;
        card.classList.toggle("hidden", !match);
      });
    });
  }

  function initDrinkModal() {
    const modal = document.querySelector("[data-drink-modal]");
    if (!modal) return;
    const close = modal.querySelector("[data-modal-close]");
    const title = modal.querySelector("[data-modal-title]");
    const desc = modal.querySelector("[data-modal-desc]");
    const price = modal.querySelector("[data-modal-price]");
    const tags = modal.querySelector("[data-modal-tags]");
    const ingredients = modal.querySelector("[data-modal-ingredients]");
    const calories = modal.querySelector("[data-modal-calories]");
    const sweetness = modal.querySelector("[data-modal-sweetness]");
    const ice = modal.querySelector("[data-modal-ice]");
    const image = modal.querySelector("[data-modal-image]");

    function openDrink(id) {
      const item = drinkDetails[id];
      if (!item) return;
      title.textContent = item.title;
      desc.textContent = item.desc;
      price.textContent = item.price;
      ingredients.textContent = item.ingredients;
      calories.textContent = item.calories;
      sweetness.textContent = item.sweetness;
      ice.textContent = item.ice;
      image.src = item.image;
      image.alt = `${item.title} 饮品图`;
      tags.innerHTML = item.tags.map((tag) => `<span class="tag">${tag}</span>`).join("");
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      close.focus();
    }

    function closeDrink() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
    }

    document.querySelectorAll("[data-drink-open]").forEach((button) => {
      button.addEventListener("click", () => openDrink(button.dataset.drinkOpen));
    });

    close.addEventListener("click", closeDrink);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeDrink();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) closeDrink();
    });
  }

  function initStoreFilter() {
    const select = document.querySelector("[data-city-filter]");
    const cards = Array.from(document.querySelectorAll("[data-store-card]"));
    const pins = Array.from(document.querySelectorAll("[data-map-pin]"));
    const label = document.querySelector("[data-map-label]");
    if (!select || !cards.length) return;

    function activeStore(card) {
      cards.forEach((item) => item.classList.toggle("is-active", item === card));
      pins.forEach((pin) => pin.classList.toggle("is-active", pin.dataset.store === card.dataset.store));
      if (label) {
        label.querySelector("strong").textContent = card.dataset.store;
        label.querySelector("span").textContent = card.dataset.address;
      }
    }

    function filterCity() {
      const city = select.value;
      let firstVisible = null;
      cards.forEach((card) => {
        const show = city === "all" || card.dataset.city === city;
        card.classList.toggle("hidden", !show);
        if (show && !firstVisible) firstVisible = card;
      });
      pins.forEach((pin) => {
        pin.classList.toggle("hidden", city !== "all" && pin.dataset.city !== city);
      });
      if (firstVisible) activeStore(firstVisible);
    }

    select.addEventListener("change", filterCity);
    cards.forEach((card) => {
      card.addEventListener("mouseenter", () => activeStore(card));
      card.addEventListener("focusin", () => activeStore(card));
    });
    pins.forEach((pin) => {
      pin.addEventListener("click", () => {
        const card = cards.find((item) => item.dataset.store === pin.dataset.store);
        if (card) activeStore(card);
      });
    });
    filterCity();
  }

  function initForms() {
    document.querySelectorAll("[data-validate-form]").forEach((form) => {
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        let valid = true;
        const fields = Array.from(form.querySelectorAll("input, select, textarea"));
        fields.forEach((field) => {
          const wrapper = field.closest(".field");
          const error = wrapper?.querySelector(".field-error");
          let message = "";
          const value = field.value.trim();
          if (field.hasAttribute("required") && !value) {
            message = "请填写此项";
          } else if (field.type === "tel" && value && !/^1[3-9]\d{9}$/.test(value)) {
            message = "请输入 11 位手机号";
          } else if (field.type === "email" && value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
            message = "请输入有效邮箱";
          }
          if (error) error.textContent = message;
          field.setAttribute("aria-invalid", String(Boolean(message)));
          if (message) valid = false;
        });

        if (!valid) {
          showToast("请检查表单中标红的内容");
          return;
        }

        showToast(form.dataset.success || "已提交，工作人员会尽快联系你");
        form.reset();
      });
    });
  }

  function initOrderLinks() {
    document.querySelectorAll("[data-order-link]").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        showToast("正在打开拾茶序线上点单小程序");
      });
    });
  }

  function initSocialLinks() {
    document.querySelectorAll("[data-social-link]").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(`正在打开拾茶序${link.dataset.socialLink}`);
      });
    });
  }

  function initImagePreview() {
    const modal = document.querySelector("[data-image-modal]");
    if (!modal) return;
    const image = modal.querySelector("[data-preview-image]");
    const close = modal.querySelector("[data-image-close]");
    document.querySelectorAll("[data-preview-src]").forEach((trigger) => {
      trigger.addEventListener("click", () => {
        image.src = trigger.dataset.previewSrc;
        image.alt = trigger.dataset.previewAlt || "放大预览图";
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
        close.focus();
      });
    });
    close.addEventListener("click", () => {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
    });
    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      }
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    initNav();
    initReveal();
    initCarousel();
    initDrinkFilters();
    initDrinkModal();
    initStoreFilter();
    initForms();
    initOrderLinks();
    initSocialLinks();
    initImagePreview();
  });
})();

</script>
</body>
</html>
